<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 320px;
        margin: 0;
        font: 13px/1.5 -apple-system, Roboto, Arial, sans-serif;
        background: #fff;
        color: #202124;
      }
      header {
        padding: 14px 16px;
        background: #1a73e8;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
      }
      .body { padding: 14px 16px; }
      label { display: block; font-weight: 600; margin-bottom: 4px; }
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        font-size: 12px;
      }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
      button {
        background: #1a73e8;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary { background: #f1f3f4; color: #202124; }
      .stat { color: #5f6368; }
      .stat b { color: #202124; }
      a { color: #1a73e8; }
      .switch { position: relative; width: 40px; height: 22px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; cursor: pointer;
      }
      .slider::before {
        content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px;
        background: #fff; border-radius: 50%; transition: .2s;
      }
      input:checked + .slider { background: #1a73e8; }
      input:checked + .slider::before { transform: translateX(18px); }
      .hint { font-size: 11px; color: #5f6368; margin-top: 6px; }
      #status { font-size: 12px; min-height: 16px; margin-top: 8px; }
      #status.ok { color: #188038; }
      #status.err { color: #d93025; }
    </style>
  </head>
  <body>
    <header>Maps → Sheet Saver</header>
    <div class="body">
      <label for="url">Apps Script Web App URL</label>
      <input id="url" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
      <div class="hint">One-time setup — see SETUP.md to deploy in 2 minutes.</div>

      <label for="targetSheet" style="margin-top: 12px">Append to this Sheet (optional)</label>
      <input id="targetSheet" type="url" placeholder="https://docs.google.com/spreadsheets/d/..." />
      <div class="hint">Leave blank and a new Sheet is created for you automatically.</div>

      <div class="row">
        <span>Auto-save while browsing Maps</span>
        <label class="switch">
          <input id="enabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="row">
        <button id="save">Save settings</button>
        <button id="test" class="secondary">Test</button>
      </div>

      <div id="status"></div>

      <hr style="border:none;border-top:1px solid #eee;margin:12px 0" />
      <div class="stat">Saved this device: <b id="count">0</b></div>
      <div class="stat">Last: <b id="last">—</b></div>
      <div class="stat" style="margin-top:6px"><a id="sheet" href="#" target="_blank" style="display:none">Open your Sheet ↗</a></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
